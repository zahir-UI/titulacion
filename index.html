        // Render Products
        function renderProducts(filteredProducts) {
            const grid = document.getElementById('products-grid')

                            Añadir al carrito
                        </button>
                    </div>
                `
                grid.appendChild(card)
            })
            
            document.getElementById('results-count').textContent = `${filteredProducts.length} products found`
        }

        // Filter by category
        function filterCategory(category) {
            // Remove active class from all
            document.querySelectorAll('.nav-link').forEach(btn => {
                btn.classList.remove('active')
            })
            
            // Add active class
            if (category === 'all') {
                document.getElementById('cat-all').classList.add('active')
            } else if (category === 'fruits') {
                document.getElementById('cat-fruits').classList.add('active')
            } else if (category === 'vegetables') {
                document.getElementById('cat-vegetables').classList.add('active')
            } else if (category === 'dairy') {
                document.getElementById('cat-dairy').classList.add('active')
            } else if (category === 'meat') {
                document.getElementById('cat-meat').classList.add('active')
            } else if (category === 'bakery') {
                document.getElementById('cat-bakery').classList.add('active')
            } else if (category === 'snacks') {
                document.getElementById('cat-snacks').classList.add('active')
            } else if (category === 'mascota') {
                document.getElementById('cat-mascota').classList.add('active')
            }
            
            let filtered = products
            
            if (category !== 'all') {
                filtered = products.filter(p => p.category === category)
            }
            
            renderProducts(filtered)
        }

        // Add to cart
        function addToCart(id) {
            const product = products.find(p => p.id === id)
            if (!product) return
            
            const existing = cart.find(item => item.id === id)
            
            if (existing) {
                existing.quantity = (existing.quantity || 1) + 1
            } else {
                cart.push({...product, quantity: 1})
            }
            
            updateCartCount()
            showToast(`${product.name} añadido correctamente`)
        }

        function addPromoToCart() {
            showToast("Organic produce bundle added!")
            // You can add logic here if needed
        }

        // Update cart count
        function updateCartCount() {
            let count = 0
            cart.forEach(item => count += item.quantity || 1)
            document.getElementById('cart-count').textContent = count
        }

        // Toast notification
        function showToast(message) {
            const toast = document.createElement('div')
            toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-3xl shadow-2xl flex items-center gap-3 z-[200]`
            toast.innerHTML = `
                <i class="fa-solid fa-check-circle text-green-400"></i>
                <span>${message}</span>
            `
            document.body.appendChild(toast)
            
            setTimeout(() => {
                toast.style.transition = 'all 0.4s ease'
                toast.style.opacity = '0'
                toast.style.transform = 'translate(-50%, 20px)'
                setTimeout(() => toast.remove(), 400)
            }, 2500)
        }

        // Cart sidebar
        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar')
            if (sidebar.classList.contains('translate-x-full')) {
                sidebar.classList.remove('translate-x-full')
                renderCart()
            } else {
                sidebar.classList.add('translate-x-full')
            }
        }

        function renderCart() {
            const container = document.getElementById('cart-items')
            container.innerHTML = ''
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-400">
                        <i class="fa-solid fa-cart-shopping text-6xl mb-4"></i>
                        <p class="text-lg">El carrito esta vacio</p>
                    </div>
                `
                document.getElementById('cart-total').textContent = '$0.00'
                return
            }
            
            let total = 0
            
            cart.forEach((item, index) => {
                const itemTotal = item.price * (item.quantity || 1)
                total += itemTotal
                
                const div = document.createElement('div')
                div.className = "flex gap-4"
                div.innerHTML = `
                    <img src="${item.image || 'https://picsum.photos/id/' + (item.id + 20) + '/80/80'}" 
                        class="w-20 h-20 object-cover rounded-2xl">
                    <div class="flex-1">
                        <h4 class="font-medium">${item.name}</h4>
                        <p class="text-sm text-gray-500">${item.unit}</p>
                        <div class="flex items-center justify-between mt-2">
                            <div class="flex items-center border border-gray-200 rounded-2xl">
                                <button onclick="changeQuantity(${index}, -1)" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:text-gray-900">-</button>
                                <span class="px-3">${item.quantity || 1}</span>
                                <button onclick="changeQuantity(${index}, 1)" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:text-gray-900">+</button>
                            </div>
                            <div>
                                <span class="font-semibold">$${(itemTotal).toFixed(2)}</span>
                            </div>
                        </div>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-red-400 hover:text-red-600">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                `
                container.appendChild(div)
            })
            
            document.getElementById('cart-total').textContent = `$${total.toFixed(2)}`
        }

        function changeQuantity(index, change) {
            if (!cart[index]) return
            cart[index].quantity = (cart[index].quantity || 1) + change
            
            if (cart[index].quantity < 1) {
                cart.splice(index, 1)
            }
            
            renderCart()
            updateCartCount()
        }

        function removeFromCart(index) {
            cart.splice(index, 1)
            renderCart()
            updateCartCount()
        }

        function checkout() {
            if (cart.length === 0) return
            alert("Thank you for your order! (Demo)")
            cart = []
            updateCartCount()
            toggleCart()
        }

        function toggleSignIn() {
            alert("Sign in functionality would go here (Demo)")
        }

        function learnMore() {
            alert("Learn more about our organic products! (Demo)")
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim()
            
            if (!term) {
                filterCategory('all')
                return
            }
            
            const filtered = products.filter(product => 
                product.name.toLowerCase().includes(term)
            )
            
            document.getElementById('section-title').textContent = `Results for "${term}"`
            renderProducts(filtered)
            if (term

            ) {
                
            }
        })

        window.onload = function() {
            renderProducts(products)
            
        }
    </script>
